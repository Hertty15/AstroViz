<!DOCTYPE html>
<html>
<head>
    <title>NASA Eyes</title>
    <style>
        body{
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Helvetica Neue' Arial, sans-serif;
        }
        #info-panel{
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            max-width: 300px;
        }
        #time-control{
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <canvas id="spaceCanvas"></canvas>

    <!--nasa like info panel-->
    <div id="info-panel">
        <h3 style="margin: 0 0 10px 0">Mars Simulation</h3>
        <p id="distance-text">Distance from Sun: -- AU</p>
        <p id="speed-text">Orbital Speed: -- km</p>
        <p id="time-text">Date: --</p>
    </div>

    <!--time control-->
    <div id="time-control">
        <label>Simulation Speed:
            <input type="range" id="speed-slider" min="1" max="1000" value="100">
        </label>
    </div>

    <!--three.js and nasa loader-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        //
        //nasa eyes-core sys
        //
        //

        //intitialise three.js
        const canvas=document.getElementById('spaceCanvas');
        const scene=new THREE.Scene();
        const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
        const renderer=new THREE.WebGLRenderer({canvas, antialias:true});
        renderer.setSize(window.innerWidth,window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        camera.position.z=50//start zoomed out

        //adddign realistic lighting
        //spacey glow
        scene.add(new THREE.AmbientLight(0x222222,0.5));
        
        //directioanl ligth
        const sunlight=new THREE.DirectionalLight(0xffffff,1);
        sunlight.position.set(0,10,0);
        scene.add(sunlight);

        //create solar system objs
        //sun(with texture)
        const sungeometry=new THREE.SphereGeometry(1.5,32,32);
        const sunmaterial=new THREE.MeshPhongMaterial({
            color:0xffff00,
            emissive:0xffaa00,
            emmisiveintensity:1
        });
        const sun=new THREE.Mesh(sungeometry,sunmaterial);
        scene.add(sun);

        //mars(with texture)
        const marsgeometry=new THREE.SphereGeometry(0.4,32,32);
        const marsmaterial=new THREE.MeshPhongMaterial({
            color:0xff4400,
            emissive:0xff4400,
            emmisiveintensity:0.1
        });
        const mars=new THREE.Mesh(marsgeometry,marsmaterial)
        scene.add(mars);

        //orbital trail
        const orbitPoints=[];
        for(let i=0; i<360; i++){
            const angle=i*Math.PI/180;
            orbitPoints.push(new THREE.Vector3(
                Math.cos(angle)*15,//15 AU scale
                Math.sin(angle)*15,
                0
            ));
        }
        const orbitgeometry=new THREE.BufferGeometry().setFromPoints(orbitPoints);
        const orbitmaterial=new THREE.LineBasicMaterial({color:0x4444ff, transparent:true, opacity:0.5});
        const orbitalLine=new THREE.Line(orbitgeometry,orbitmaterial);
        scene.add(orbitalLine);

        //nasa data integration (orbit mechanics)
        //nasa apikey
        const NASA_API_KEY='5KKvp64tkbDpluf4cgu56808bw5tY811azybHPsw';

        //mars orbital parameters
        const MARS_ORBIT={
            a:1.524, //semi-major axis (AU)
            e:0.0934, //eccentricity
            i:1.85,   //inclination(degrees)
            w:286.5,   //argument of periapsis(deg)
            meanMotion:0.524 //deg per day
        };

        //real-time date tracker
        let currentDate=new Date();
        const EPOCH=new Date(2024,0,1);//start date

        //animation loop
        function animate(){
            requestAnimationFrame(animate);

            //updatesimulationspeed
            const speed=document.getElementById('speed-slider').value;
            currentDate=new Date(EPOCH.getTime()+(date.now()-EPOCH.getTime()) *speed/100);

            //calc mars position using keplers equation
            const daysSinceEpoch=(currentDate-EPOCH)/86400000;
            const meanAnomaly=(daysSinceEpoch*MARS_ORBIT.meanMotion)%360;

            //simplified keplers equation
            const eccentricAnomaly=meanAnomaly+MARS_ORBIT.e*Math.sin(meanAnomaly*Math.PI/180);
            const trueAnomaly=2*Math.atan2(
                Math.sprt(1+MARS_ORBIT.e)*Math.sin(eccentricAnomaly*Math.PI/180/2),
                Math.sprt(1-MARS_ORBIT.e)*Math.sin(eccentricAnomaly*Math.PI/180/2)
            );

            //convert to 3d postion(simplified)
            const r=MARS_ORBIT.a*(1-MARS_ORBIT.e*MARS_ORBIT.e)/(1+MARS_ORBIT.e*Math.cos(trueAnomaly));
            mars.position.x=r*Math.cos(trueAnomaly);
            mars.position.y=r*Math.sin(trueAnomaly);
            mars.position=0;

            //updte info panel
            const distance=Math.sqrt(mars.position.x**2+mars.position.y**2);
            document.getElementById('distance-text').textContent=`Distance from Sun: ${distance.toFixed(2)} AU`;
            document.getElementById('speed-text').textContent=`Orbital Speed: ${(distance*0.001).toFixed(2)}km/s`;
            document.getElementById('time-text').textContent=`Date: ${currentDate.toISOString().split('T')[0]}`;

            //rotate sun for visuals
            sun.rotation.y+=0.001;

            //render scene
            renderer.render(scene,camera);
        }

        //initialise
        //add orbit controls
        const controls=new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping=true;
        controls.dampingFactor=0.05;

        //start animation
        animate();

        //handle window resize
        window.addEventListener('resize', ()=>{
            camera.aspect=window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth,window.innerHeight);
        });
    </script>

    <!--orbit controls-->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControl.min.js"></script>
</body>
</html>
