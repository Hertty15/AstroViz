<!DOCTYPE html>
<html>
<head>
    <title>My Solar System</title>
    <style>
        body{margin: 0; background-color: black;}
    </style>
</head>
<body>
    <!--this is where three.js will draw 3d world-->
    <canvas id="spacecanvas"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        //create the empty space (scene)
        const scene=new THREE.Scene();

        //add ambient light
        scene.add(new THREE.AmbientLight(0x404040,0.5));
        //add dirictionl lihgt
        const sunlight=new THREE.DirectionalLight(0xffffff, 1);
        sunlight.position.set(0,10,0);//postion near sun
        scene.add(sunlight);
        
        //create the cam
        const cam=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
        cam.position.z=25//move the cam back so we can acc see things
        
        //create the drawing
        const canvas=document.getElementById('spacecanvas');
        const renderer=new THREE.WebGLRenderer({canvas:canvas});
        renderer.setSize(window.innerWidth, window.innerHeight);

        //nasa data
        const MARS={
            AU: 1.524,//semi major axis
            ORBITAL_PERIOD: 686.98,//earth days
            SIZE: 0.4,//relative to sun being 1.0
            COLOR: 0xff4400
        };

        //create a sphrer
        const sungeometry=new THREE.SphereGeometry(1,32,32);
        //create material
        const sunmaterial=new THREE.MeshPhongMaterial({
            color: 0xffaa00,
            emissive: 0xffff00,
            emissiveintensity:1
        });
        //coombine them
        const sun=new THREE.Mesh(sungeometry,sunmaterial);
        //add to scene
        scene.add(sun);

        //creat mars
        const marsgeometry=new THREE.SphereGeometry(1.0, 32,32);
        const marsmaterial=new THREE.MeshPhongMaterial({
            color:MARS.COLOR,
            emissive:MARS.COLOR,
            emissiveIntensity:0.2,
            shininess:30
        });
        const mars=new THREE.Mesh(marsgeometry,marsmaterial);
        scene.add(mars);

        //get live asteroids from nasa
        async function loadAsteroids(){
            const api_key='5KKvp64tkbDpluf4cgu56808bw5tY811azybHPsw';
            const response=await fetch(`https://api.nasa.gov/neo/rest/v1/feed??api_key=${api_key}`);
            const data=await response.json();
            //create asteroid objects
            Object.values(data.near_earth_objects).flat().slice(0,5).forEach(asteroid => {
                const size=Math.sqrt(asteroid.estimated_diameter.kilometers.estimated_diameter_max)*0.05;
                const asteroidgeo=new THREE.SphereGeometry(size, 16,16);
                const asteroidmaterial=new THREE.MeshPhongMaterial({color:0x888888});
                const asteroidobject=new THREE.Mesh(asteroidgeo,asteroidmaterial);
                
                //position near earths orbit
                asteroidobject.position.x=Math.random()*20-10;
                asteroidobject.position.y=Math.random()-20-10;
                scene.add(asteroidobject);
            });
        }
        loadAsteroids();

        function animate(){
            //it to draw scene from cam's pov
            renderer.render(scene, cam);
            //loop it
            requestAnimationFrame(animate);
            //make sun rotate
            sun.rotation.y+=0.01;
            //mars orbit
            //fix mars scale
            const SCALE=10;
            const marsangle=Date.now()/(MARS.ORBITAL_PERIOD*86400000)*Math.PI*2;
            mars.position.x=Math.cos(marsangle)*MARS.AU*SCALE;
            mars.position.y=Math.sin(marsangle)*MARS.AU*SCALE;
        }
        //start loop
        animate();
    </script>
</body>
</html>
