<!DOCTYPE html>
<html>
<head>
    <title>My Solar System</title>
    <style>
        body{margin: 0; background-color: black;}
    </style>
</head>
<body>
    <!--this is where three.js will draw 3d world-->
    <canvas id="spacecanvas"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        //nasa data
        const MARS={
            AU: 1.524,//semi major axis
            ORBITAL_PERIOD: 686.98,//earth days
            SIZE: 0.4,//relative to sun being 1.0
            COLOR: 0xff4400
        };
        //create the empty space (scene)
        const scene=new THREE.Scene();
        //create the cam
        const cam=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
        cam.position.z=5//move the cam back so we can acc see things
        //create the drawing
        const canvas=document.getElementById('spacecanvas');
        const renderer=new THREE.WebGLRenderer({canvas:canvas});
        renderer.setSize(window.innerWidth, window.innerHeight);

        //create a sphrer
        const sungeometry=new THREE.SphereGeometry(1,32,32);
        //create material
        const sunmaterial=new THREE.MeshBasicMaterial({color: 0xffaa00});
        //coombine them
        const sun=new THREE.Mesh(sungeometry,sunmaterial);
        //add to scene
        scene.add(sun);

        //creat mars
        const marsgeometry=new THREE.SphereGeometry(MARS.SIZE, 32,32);
        const marsmaterial=new THREE.MeshBasicMaterial({
            color:MARS.COLOR,
            emissive:MARS.COLOR*0.2,
            shininess:30
        });
        const mars=new THREE.Mesh(marsgeometry,marsmaterial);
        scene.add(mars);

        function animate(){
            //it to draw scene from cam's pov
            renderer.render(scene, cam);
            //loop it
            requestAnimationFrame(animate);
            //make sun rotate
            sun.rotation.y+=0.01;
            //mars orbit
            const marsangle=Date.now()/(MARS.ORBITAL_PERIOD*86400000)*Math.PI*2;
            mars.position.x=Math.cos(marsangle)*MARS.AU*100;
            mars.position.y=Math.sin(marsangle)*MARS.AU*100;
        }
        //start loop
        animate();
    </script>
</body>
</html>
