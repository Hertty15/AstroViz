<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        #speed-control {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="speed-control">
        Speed: <input type="range" id="speedSlider" min="1" max="100" value="10">
    </div>
    <div id="info">
        <h3 style="margin: 0 0 10px 0;">Mars Simulation</h3>
        <p>Distance: <span id="distance">--</span> AU</p>
        <p>Date: <span id="date">--</span></p>
    </div>

    <!-- Import Map for Three.js ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <!-- Main Code as ES Module -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ===== SCENE SETUP =====
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 30, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // ===== CONTROLS =====
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 10;
        controls.maxDistance = 200;

        // ===== LIGHTING =====
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 2, 300);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);

        // ===== SUN =====
        const sunGeometry = new THREE.SphereGeometry(5, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({
            color: 0xffff00
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        // ===== MARS =====
        const marsGeometry = new THREE.SphereGeometry(1, 32, 32);
        const marsMaterial = new THREE.MeshPhongMaterial({
            color: 0xff4400,
            shininess: 30
        });
        const mars = new THREE.Mesh(marsGeometry, marsMaterial);
        scene.add(mars);

        // ===== ORBIT PATH =====
        const orbitRadius = 20;
        const orbitCurve = new THREE.EllipseCurve(
            0, 0,
            orbitRadius, orbitRadius,
            0, 2 * Math.PI,
            false,
            0
        );
        const orbitPoints = orbitCurve.getPoints(100);
        const orbitGeometry = new THREE.BufferGeometry().setFromPoints(
            orbitPoints.map(p => new THREE.Vector3(p.x, 0, p.y))
        );
        const orbitMaterial = new THREE.LineBasicMaterial({
            color: 0x4444ff,
            transparent: true,
            opacity: 0.5
        });
        const orbitLine = new THREE.Line(orbitGeometry, orbitMaterial);
        scene.add(orbitLine);

        // ===== ANIMATION =====
        let time = 0;
        const marsOrbitalPeriod = 687; // days
        const speedSlider = document.getElementById('speedSlider');

        function animate() {
            requestAnimationFrame(animate);

            const speed = speedSlider.value / 10;
            time += 0.01 * speed;

            // Mars orbit (circular for simplicity)
            const angle = time * (2 * Math.PI / marsOrbitalPeriod);
            mars.position.x = Math.cos(angle) * orbitRadius;
            mars.position.z = Math.sin(angle) * orbitRadius;

            // Rotate Sun
            sun.rotation.y += 0.002;

            // Update info
            const distance = Math.sqrt(
                mars.position.x ** 2 + mars.position.z ** 2
            ) / orbitRadius;
            document.getElementById('distance').textContent = distance.toFixed(2);
            document.getElementById('date').textContent = 
                new Date(Date.now() + time * 86400000).toLocaleDateString();

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
